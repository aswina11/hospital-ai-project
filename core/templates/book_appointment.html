{% extends 'base.html' %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0">
                <div class="card-body p-4">
                    <h3 class="fw-bold text-primary mb-4">
                        <i class="fa-solid fa-calendar-check me-2"></i>Book Appointment
                    </h3>
                    
                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Select Doctor</label>
                            <select name="doctor" class="form-select" required>
                                <option value="" disabled selected>Choose a specialist...</option>
                                {% for doc in doctors %}
                                    <option value="{{ doc.id }}">{{ doc.name }} ({{ doc.specialization }})</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label small fw-bold">Date</label>
                                <input type="date" name="date" id="appointment_date" class="form-control" required>
                                <div id="dateHelp" class="form-text small">Advanced booking only.</div>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label small fw-bold">Time Slot (15-min)</label>
                                <select name="time" class="form-select" required>
                                    <option value="" disabled selected>Available Slots...</option>
                                    {% for slot in slots %}
                                        <option value="{{ slot }}">{{ slot }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-bold">Describe Symptoms</label>
                            <textarea name="symptoms" class="form-control" rows="3" placeholder="Briefly describe your health concern..."></textarea>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 fw-bold shadow-sm">
                            Confirm Appointment Booking
                        </button>
                    </form>
                </div>
            </div>
            
            <p class="text-center mt-3 text-muted small">
                <i class="fa-solid fa-lock me-1"></i> Your medical privacy is our top priority.
            </p>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const datePicker = document.getElementById('appointment_date');
        
        // 1. Get current date
        const today = new Date();
        
        // 2. Shift to tomorrow
        const tomorrow = new Date(today);
        tomorrow.setDate(tomorrow.getDate() + 1);
        
        // 3. Format to YYYY-MM-DD
        const tomorrowStr = tomorrow.toISOString().split('T')[0];
        
        // 4. Set min attribute and default value
        datePicker.setAttribute('min', tomorrowStr);
        datePicker.value = tomorrowStr;
    });
</script>
{% endblock %}
