{% extends 'base.html' %}
{% block content %}
<div class="container my-5">
    <div class="card shadow-lg border-0">
        <div class="card-header bg-primary text-white p-4">
            <h2 class="mb-0">Medical Analysis Report</h2>
        </div>
        <div class="card-body p-5">
            <div class="row">
                <div class="col-md-6">
                    <h4 class="fw-bold">Scan Image</h4>
                    <img src="{{ report.image.url }}" class="img-fluid rounded border shadow-sm">
                </div>
                <div class="col-md-6">
                    <h4 class="fw-bold">AI Analysis Findings</h4>
                    <hr>
                   <div class="p-4 bg-white rounded border shadow-sm">
    <h5 class="text-primary fw-bold mb-3"><i class="fa-solid fa-microscope"></i> AI Clinical Findings</h5>
    <hr>
    <div class="report-text" style="line-height: 1.8; font-size: 1.1rem;">
        {{ report_html|safe }}
    </div>
</div>
                    <p class="mt-4 text-muted small">Generated on: {{ report.date_uploaded }}</p>
                    <button onclick="window.print()" class="btn btn-outline-secondary mt-3">
                        <i class="fa-solid fa-print"></i> Print Report
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
